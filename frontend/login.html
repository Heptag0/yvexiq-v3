<!DOCTYPE html>
<html lang="es">
<head><link rel="icon" href="/favicon.ico"><link rel="apple-touch-icon" href="/yvexiq_256.png"><link rel="icon" href="/favicon.ico"><link rel="apple-touch-icon" href="/yvexiq_256.png">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YvexIQ — Acceso</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:            #08091a;
      --violet:        #9333ea;
      --violet-light:  #c084fc;
      --violet-bright: #d946ef;
      --violet-glow:   rgba(147,51,234,0.45);
      --indigo:        #4f46e5;
      --glass:         rgba(255,255,255,0.055);
      --glass-border:  rgba(255,255,255,0.1);
      --text:          #f5f3ff;
      --text-dim:      rgba(245,243,255,0.55);
      --text-faint:    rgba(245,243,255,0.3);
      --input-bg:      rgba(255,255,255,0.05);
      --input-border:  rgba(255,255,255,0.12);
      --error:         #fb7185;
      --ok:            #4ade80;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      position: relative;
      padding: 32px 24px;
    }

    .aurora { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .al { position: absolute; border-radius: 50%; filter: blur(80px); mix-blend-mode: screen; animation: aMove 14s ease-in-out infinite; }
    .a1 { width:650px; height:500px; background:radial-gradient(ellipse, rgba(120,40,220,0.65) 0%, transparent 65%); top:-200px; left:-180px; animation-delay:0s; }
    .a2 { width:550px; height:550px; background:radial-gradient(ellipse, rgba(67,46,210,0.5) 0%, transparent 65%); bottom:-180px; right:-150px; animation-delay:-5s; animation-name:aMove2; }
    .a3 { width:400px; height:400px; background:radial-gradient(ellipse, rgba(180,50,230,0.4) 0%, transparent 65%); top:50%; left:50%; transform:translate(-50%,-50%); animation-delay:-9s; }

    @keyframes aMove  { 0%,100%{transform:translate(0,0) scale(1)} 40%{transform:translate(40px,-30px) scale(1.1)} 70%{transform:translate(-20px,20px) scale(0.95)} }
    @keyframes aMove2 { 0%,100%{transform:translate(0,0) scale(1)} 40%{transform:translate(-35px,30px) scale(1.08)} 70%{transform:translate(25px,-20px) scale(0.97)} }

    .bg-grid { position: fixed; inset: 0; pointer-events: none; z-index: 0; background-image: radial-gradient(rgba(147,51,234,0.12) 1px, transparent 1px); background-size: 40px 40px; }

    .wrap { position: relative; z-index: 1; width: 100%; max-width: 460px; display: flex; flex-direction: column; align-items: center; }

    .header { text-align: center; margin-bottom: 32px; animation: rise 0.8s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; }
    @keyframes rise { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

    .logo-badge { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--violet), var(--indigo)); border-radius: 13px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 800; color: white; box-shadow: 0 0 28px var(--violet-glow), 0 0 60px rgba(147,51,234,0.2); }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 800; letter-spacing: -1px; background: linear-gradient(135deg, #fff 0%, var(--violet-light) 60%, var(--violet) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .hero-title { font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 800; line-height: 1.15; letter-spacing: -1px; margin-bottom: 12px; }
    .hero-title em { font-style: italic; background: linear-gradient(135deg, var(--violet-light), var(--violet-bright)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero-sub { font-size: 14px; color: var(--text-dim); line-height: 1.65; font-weight: 300; margin-bottom: 20px; }

    .mini-stats { display: inline-flex; gap: 0; overflow: hidden; border-radius: 12px; border: 1px solid rgba(147,51,234,0.25); }
    .ms { padding: 8px 18px; font-size: 12px; text-align: center; display: flex; flex-direction: column; gap: 2px; border-right: 1px solid rgba(147,51,234,0.2); }
    .ms:last-child { border-right: none; }
    .ms-val { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #fff, var(--violet-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .ms-label { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.8px; }

    .card { width: 100%; position: relative; background: linear-gradient(150deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.025) 100%); border: 1px solid var(--glass-border); border-radius: 28px; padding: 40px; backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); box-shadow: 0 0 0 1px rgba(147,51,234,0.15), 0 28px 70px rgba(0,0,10,0.6), inset 0 1px 0 rgba(255,255,255,0.09); animation: rise 0.8s cubic-bezier(0.16,1,0.3,1) 0.15s forwards; opacity: 0; }
    .card::before { content: ''; position: absolute; top: 0; left: 28px; right: 28px; height: 1px; background: linear-gradient(90deg, transparent, rgba(192,132,252,0.8), transparent); }

    .tabs { display: flex; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 4px; margin-bottom: 28px; }
    .tab { flex: 1; padding: 10px; text-align: center; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; color: var(--text-faint); cursor: pointer; border-radius: 11px; transition: all 0.28s ease; border: none; background: none; letter-spacing: 0.2px; }
    .tab.active { background: linear-gradient(135deg, var(--violet) 0%, var(--violet-bright) 100%); color: white; box-shadow: 0 4px 18px var(--violet-glow); }
    .tab:hover:not(.active) { color: var(--text-dim); }

    .form-panel { display:none; flex-direction:column; gap:18px; }
    .form-panel.active { display:flex; }

    .field { display:flex; flex-direction:column; gap:7px; }
    .field label { font-size:12px; font-weight:600; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.9px; }

    .irow { position:relative; }
    .irow .icon-left { position:absolute; left:14px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--text-faint); pointer-events:none; transition:color 0.2s; }
    .irow:focus-within .icon-left { color:var(--violet-light); }
    .irow .toggle-pass { position:absolute; right:14px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--text-faint); cursor:pointer; border:none; background:none; padding:0; transition:color 0.2s; }
    .irow .toggle-pass:hover { color:var(--violet-light); }

    input { width:100%; padding:8px 42px; background:var(--input-bg); border:1px solid var(--input-border); border-radius:12px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; outline:none; transition:all 0.22s ease; min-height:20px; }
    input::placeholder { color:var(--text-faint); }
    input:focus { border-color:var(--violet); background:rgba(147,51,234,0.09); box-shadow:0 0 0 3px rgba(147,51,234,0.22); }

    .btn { width:100%; padding:10px; background:linear-gradient(135deg, #7c22d4 0%, #9333ea 50%, #c026d3 100%); border:none; border-radius:12px; color:white; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:700; cursor:pointer; letter-spacing:0.2px; transition:all 0.22s ease; position:relative; overflow:hidden; box-shadow:0 4px 24px rgba(147,51,234,0.5); margin-top:6px; min-height:20px; }
    .btn::before { content:''; position:absolute; inset:0; background:linear-gradient(to bottom, rgba(255,255,255,0.15), transparent); pointer-events:none; }
    .btn:hover { transform:translateY(-2px); box-shadow:0 10px 36px rgba(147,51,234,0.6); }
    .btn:active { transform:translateY(0); }
    .btn.loading { pointer-events:none; opacity:0.72; }

    .spinner { display:none; width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto; }
    @keyframes spin { to{transform:rotate(360deg)} }

    .msg { display:none; align-items:center; gap:9px; padding:11px 14px; border-radius:10px; font-size:13px; }
    .msg.show { display:flex; }
    .msg-err { background:rgba(251,113,133,0.1); border:1px solid rgba(251,113,133,0.28); color:var(--error); }
    .msg-ok  { background:rgba(74,222,128,0.1); border:1px solid rgba(74,222,128,0.28); color:var(--ok); }

    .card-footer { text-align:center; margin-top:22px; font-size:12px; color:var(--text-faint); animation:rise 0.8s cubic-bezier(0.16,1,0.3,1) 0.25s forwards; opacity:0; }
    .card-footer a { color:var(--violet-light); text-decoration:none; }
    .card-footer a:hover { opacity:0.8; }

    @media(max-width:500px){ .card { padding:28px 22px; border-radius:20px; } .hero-title { font-size:26px; } }
  </style>
</head>
<body>

  <div class="aurora">
    <div class="al a1"></div>
    <div class="al a2"></div>
    <div class="al a3"></div>
  </div>
  <div class="bg-grid"></div>

  <div class="wrap">
    <div class="header">
      <div class="logo-badge">
        <div class="logo-icon">Y</div>
        <span class="logo-text">YvexIQ</span>
      </div>
      <h1 class="hero-title">Tu negocio,<br><em>tus respuestas.</em></h1>
      <p class="hero-sub">Consulta cualquier dato en lenguaje natural.<br>Sin SQL, sin complicaciones.</p>
      <div class="mini-stats">
        <div class="ms"><span class="ms-val">&lt;3s</span><span class="ms-label">Por consulta</span></div>
        <div class="ms"><span class="ms-val">IA</span><span class="ms-label">Generativa</span></div>
        <div class="ms"><span class="ms-val">100%</span><span class="ms-label">Tus datos</span></div>
      </div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login',this)">Iniciar sesión</button>
        <button class="tab" onclick="switchTab('register',this)">Crear cuenta</button>
      </div>

      <!-- Login -->
      <div class="form-panel active" id="panel-login">
        <div class="msg msg-err" id="login-error">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="login-error-text"></span>
        </div>
        <div class="field">
          <label>Correo electrónico</label>
          <div class="irow">
            <input type="email" id="login-email" placeholder="tu@negocio.com" autocomplete="email"/>
            <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
        </div>
        <div class="field">
          <label>Contraseña</label>
          <div class="irow">
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
            <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <button class="toggle-pass" onclick="togglePassword('login-password', this)" tabindex="-1">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button> 
          </div>
        </div>
        <button class="btn" id="btn-login" onclick="handleLogin()">
          <span id="login-text">Entrar</span>
          <div class="spinner" id="login-spinner"></div>
        </button>
      </div>

      <!-- Registro -->
      <div class="form-panel" id="panel-register">
        <div class="msg msg-err" id="register-error">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="register-error-text"></span>
        </div>
        <div class="msg msg-ok" id="register-success">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><polyline points="20 6 9 17 4 12"/></svg>
          <span>¡Cuenta creada! Redirigiendo al login...</span>
        </div>
        <div class="field">
          <label>Correo electrónico</label>
          <div class="irow">
            <input type="email" id="register-email" placeholder="tu@negocio.com" autocomplete="email"/>
            <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
        </div>
        <div class="field">
          <label>Contraseña</label>
          <div class="irow">
            <input type="password" id="register-password" placeholder="Mínimo 8 caracteres" autocomplete="new-password"/>
            <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <button class="toggle-pass" onclick="togglePassword('register-password', this)" tabindex="-1">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <label>Confirmar contraseña</label>
          <div class="irow">
            <input type="password" id="register-password2" placeholder="Repite tu contraseña" autocomplete="new-password"/>
            <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <button class="toggle-pass" onclick="togglePassword('register-password2', this)" tabindex="-1">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button class="btn" id="btn-register" onclick="handleRegister()">
          <span id="register-text">Crear cuenta</span>
          <div class="spinner" id="register-spinner"></div>
        </button>
      </div>
    </div>

    <div class="card-footer">
      Al continuar aceptas los <a href="#">Términos de uso</a> y la <a href="#">Política de privacidad</a>
    </div>
  </div>

  <script>
    const API = 'http://127.0.0.1:8000';

    // Redirigir al dashboard si ya hay sesión activa
    const existingToken = localStorage.getItem('yvex_token');
    if (existingToken) {
      try {
        const payload = JSON.parse(atob(existingToken.split('.')[1]));
        if (payload.exp * 1000 > Date.now()) {
          window.location.href = 'dashboard.html';
        }
      } catch {}
    }

    // Rate limiting
    let lastLoginAttempt = 0;
    const LOGIN_COOLDOWN = 2000;

    function isValidEmail(email) {
      return /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(email);
    }

    function switchTab(tab, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('panel-' + tab).classList.add('active');
    }

    function setLoading(btn, sp, txt, on) {
      document.getElementById(btn).classList.toggle('loading', on);
      document.getElementById(sp).style.display = on ? 'block' : 'none';
      document.getElementById(txt).style.display = on ? 'none' : 'block';
    }

    function showMsg(id, text) {
      if (text !== undefined) document.getElementById(id + '-text').textContent = text;
      document.getElementById(id).classList.add('show');
    }
    function hideMsg(id) { document.getElementById(id).classList.remove('show'); }

    // Toggle mostrar/ocultar contraseña
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      btn.querySelector('svg').innerHTML = isPassword
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }

    async function handleLogin() {
      hideMsg('login-error');

      const now = Date.now();
      if (now - lastLoginAttempt < LOGIN_COOLDOWN) {
        showMsg('login-error', 'Espera un momento antes de intentar de nuevo.');
        return;
      }

      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-password').value;

      if (!email || !pass) { showMsg('login-error', 'Completa todos los campos.'); return; }
      if (!isValidEmail(email)) { showMsg('login-error', 'El formato del correo no es válido.'); return; }

      lastLoginAttempt = now;
      setLoading('btn-login', 'login-spinner', 'login-text', true);
      try {
        const fd = new FormData();
        fd.append('username', email);
        fd.append('password', pass);
        const res = await fetch(API + '/login', { method: 'POST', body: fd, credentials: 'include' });
        const data = await res.json();
        if (!res.ok) showMsg('login-error', data.detail || 'Credenciales incorrectas.');
        else {
            localStorage.setItem('yvex_token', data.access_token);
            if (data.es_admin) {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        }
      } catch { showMsg('login-error', 'Error de conexión con el servidor.'); }
      finally { setLoading('btn-login', 'login-spinner', 'login-text', false); }
    }

    async function handleRegister() {
      hideMsg('register-error');
      hideMsg('register-success');

      const email = document.getElementById('register-email').value.trim();
      const pass  = document.getElementById('register-password').value;
      const pass2 = document.getElementById('register-password2').value;

      if (!email || !pass || !pass2) { showMsg('register-error', 'Completa todos los campos.'); return; }
      if (!isValidEmail(email)) { showMsg('register-error', 'El formato del correo no es válido.'); return; }
      if (pass.length < 8) { showMsg('register-error', 'Mínimo 8 caracteres en la contraseña.'); return; }
      if (pass !== pass2) { showMsg('register-error', 'Las contraseñas no coinciden.'); return; }

      setLoading('btn-register', 'register-spinner', 'register-text', true);
      try {
        const res = await fetch(API + '/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pass })
        });
        const data = await res.json();
        if (!res.ok) showMsg('register-error', data.detail || 'Error al registrar.');
        else {
          showMsg('register-success');
          document.getElementById('register-email').value = '';
          document.getElementById('register-password').value = '';
          document.getElementById('register-password2').value = '';
          setTimeout(() => switchTab('login', document.querySelectorAll('.tab')[0]), 2200);
        }
      } catch { showMsg('register-error', 'Error de conexión con el servidor.'); }
      finally { setLoading('btn-register', 'register-spinner', 'register-text', false); }
    }

    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      document.querySelector('.form-panel.active').id === 'panel-login' ? handleLogin() : handleRegister();
    });
  </script>
</body>
</html>
