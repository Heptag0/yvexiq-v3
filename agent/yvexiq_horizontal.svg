<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#0d0120"/>
    </linearGradient>
    <linearGradient id="yg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9d5ff"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d946ef" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="b1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="b2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c026d3" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c22d4" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="b3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c026d3" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Icono cuadrado redondeado -->
  <rect x="4" y="8" width="144" height="144" rx="34" fill="url(#bg)"/>
  <rect x="4" y="8" width="144" height="144" rx="34" fill="none" stroke="#7c22d4" stroke-width="2" opacity="0.35"/>

  <!-- Y grande ocupando el cuadrado -->
  <line x1="20" y1="20" x2="76" y2="80" stroke="url(#yg)" stroke-width="14" stroke-linecap="round"/>
  <line x1="132" y1="20" x2="76" y2="80" stroke="url(#yg)" stroke-width="14" stroke-linecap="round"/>
  <line x1="76" y1="80" x2="76" y2="116" stroke="url(#yg)" stroke-width="14" stroke-linecap="round"/>

  <!-- Halo + punto magenta -->
  <circle cx="76" cy="116" r="26" fill="url(#halo)"/>
  <circle cx="76" cy="116" r="14" fill="#d946ef"/>
  <circle cx="76" cy="116" r="7" fill="#f0abfc"/>

  <!-- Barras centradas verticalmente detrás del texto -->
  <rect x="168" y="44" width="18" height="72" fill="url(#b1)" rx="4"/>
  <rect x="194" y="32" width="18" height="84" fill="url(#b1)" rx="4"/>
  <rect x="220" y="20" width="18" height="96" fill="url(#b2)" rx="4"/>
  <rect x="246" y="28" width="18" height="88" fill="url(#b2)" rx="4"/>
  <rect x="272" y="40" width="18" height="76" fill="url(#b2)" rx="4"/>
  <rect x="316" y="24" width="18" height="92" fill="url(#b3)" rx="4"/>
  <rect x="342" y="36" width="18" height="80" fill="url(#b3)" rx="4"/>
  <rect x="368" y="44" width="18" height="72" fill="url(#b3)" rx="4"/>
  <rect x="394" y="32" width="18" height="84" fill="url(#b1)" rx="4"/>

  <!-- Texto "vex" blanco ligero -->
  <text x="162" y="108" font-family="DejaVu Sans" font-size="80" font-weight="200" fill="white" letter-spacing="-2">vex</text>

  <!-- Texto "IQ" púrpura -->
  <text x="318" y="108" font-family="DejaVu Sans" font-size="80" font-weight="700" fill="#a855f7">IQ</text>

</svg>
